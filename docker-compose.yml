services:
  redis:
    image: redis:7-alpine
    container_name: docchain-redis
    restart: unless-stopped
    volumes:
      - docchain-redis-data:/data

  backend:
    build:
      context: ./docfides-backend
    container_name: docchain-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    env_file:
      - ./docfides-backend/.env.docker
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./docfides-backend/uploads:/app/uploads
      - ./docfides-backend/certs:/app/certs
    command: sh -c "npx prisma migrate deploy && node dist/main"

  frontend:
    build:
      context: ./docfides-frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: docchain-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

volumes:
  docchain-redis-data:
